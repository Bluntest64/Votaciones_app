<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>
    <link rel="stylesheet" href="/static/css/registro.css">
    <script src="/static/js/script.js"></script>
</head>
<body>

<!-- HEADER CON LOGO -->

<header>
    <div class="logo">
        <img src="/static/img/logo.png" alt="Logo Registraduría">
    </div>
</header>

<!-- FORMULARIO -->

<div class="contenedor-formulario">

    <form id="form_consulta" action="/datos" method="POST">

        <h2>Registro de ciudadano</h2>

        <label>Documento</label>
        <input type="text" name="documento" required>

        <label>Nombre</label>
        <input type="text" name="nombre" required>

        <label>Ciudad</label>
        <input type="text" name="ciudad" required>

        <label>Teléfono</label>
        <input type="text" name="telefono" required>

        <!-- BOTON REGISTRAR -->
        <button type="submit">Registrar</button>

        <!-- BOTON CONSULTAR -->
        <a href="/consulta">
            <button type="button" class="btn-consultar">Consultar</button>
        </a>

        <!-- BOTON VOLVER -->
        <a href="/">
            <button type="button" class="btn-volver">Volver al inicio</button>
        </a>

    </form>

</div>

</body>
</html>
