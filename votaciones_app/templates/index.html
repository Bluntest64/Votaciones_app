<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registraduría</title>
    <link rel="stylesheet" href="/static/css/index.css">
    <script src="/static/js/script.js"></script>
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="logo">
            <img src="/static/img/logo.png" alt="Logo Registraduría">
        </div>
    </header>

    <!-- BANNER -->
    <section class="banner">

        <img src="/static/img/banner.png" alt="Banner votaciones">

        <div class="overlay">
            <h1>Lugar de votación</h1>
        </div>

    </section>

    <!-- BOTONES -->
    <section class="botones">

        <a href="/registro">
            <button class="btn">Registrar</button>
        </a>

        <a href="/consulta">
            <button class="btn">Consultar</button>
        </a>

    </section>

</body>
</html>
